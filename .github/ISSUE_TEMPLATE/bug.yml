name: Bug Report
description: Report a bug in omp-noesis
title: "bug: "
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened vs what was expected
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Steps to reproduce
      placeholder: |
        1. Run `bun test tests/...`
        2. See error
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      description: omp-noesis version
      placeholder: 1.0.0
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant output
      render: shell
